# Dependabot 配置 — 自动检测依赖更新
# 参考：https://docs.github.com/en/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "P2"
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(flutter)"
    groups:
      flutter-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "dependencies"
      - "P2"
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(actions)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/.github/npm/lore"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "ci"
      - "dependencies"
      - "P2"
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(ci)"

  - package-ecosystem: "npm"
    directory: "/.github/npm/appdmg"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "ci"
      - "dependencies"
      - "P2"
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(release)"

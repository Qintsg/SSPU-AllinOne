# 自动标签规则 — 根据文件路径匹配
# 参考：https://github.com/actions/labeler

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/app.dart'
          - 'lib/main.dart'
          - 'lib/pages/**'
          - 'lib/widgets/**'
          - 'lib/design/**'
          - 'lib/theme/**'

services:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/services/**'

models:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/models/**'

storage:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/services/storage_service.dart'
          - 'lib/services/storage_keys.dart'
          - 'lib/services/authenticated_data_cache_service.dart'
          - 'lib/services/app_data_directory_service.dart'
          - 'test/storage_service_test.dart'
          - 'test/authenticated_data_cache_service_test.dart'
          - 'test/app_data_directory_service_test.dart'

installer:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/installer/**'
          - 'test/windows_installer_legal_test.dart'

update:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/services/app_update_service.dart'
          - 'lib/widgets/settings_update_section.dart'
          - 'test/app_update_service_test.dart'

auth:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/models/academic_credentials.dart'
          - 'lib/models/academic_login_validation.dart'
          - 'lib/pages/wxmp_login_page.dart'
          - 'lib/services/*auth*'
          - 'lib/services/*credentials*'
          - 'lib/services/*login*'
          - 'lib/widgets/settings_security_credentials_section.dart'
          - 'lib/widgets/settings_wechat_auth_guide.dart'
          - 'test/*auth*'
          - 'test/*credentials*'
          - 'test/*login*'

notification:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/services/notification_service.dart'
          - 'lib/services/message_state_service_notifications.dart'
          - 'test/*notification*'

test:
  - changed-files:
      - any-glob-to-any-file:
          - 'test/**'

android:
  - changed-files:
      - any-glob-to-any-file:
          - 'android/**'

ios:
  - changed-files:
      - any-glob-to-any-file:
          - 'ios/**'

macos:
  - changed-files:
      - any-glob-to-any-file:
          - 'macos/**'

linux:
  - changed-files:
      - any-glob-to-any-file:
          - 'linux/**'

windows:
  - changed-files:
      - any-glob-to-any-file:
          - 'windows/**'

web:
  - changed-files:
      - any-glob-to-any-file:
          - 'web/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'

# Release 相关文件变更
# 注意：`release` 标签保留给人工触发 Release 工作流，不在这里自动添加。
release-files:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/release.yml'
          - '.github/actions/**'
          - '.github/installer/**'
          - 'scripts/release/**'

governance:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/ISSUE_TEMPLATE/**'
          - '.github/PULL_REQUEST_TEMPLATE/**'
          - '.github/pull_request_template.md'
          - '.github/CODEOWNERS'
          - '.github/dependabot.yml'
          - '.github/labeler.yml'
          - '.github/分支命名规范.md'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'AGENTS.md'
          - 'CLAUDE.md'
          - 'assets/legal/**'
          - 'docs/**'
          - 'README.md'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pubspec.yaml'
          - 'pubspec.lock'
          - 'analysis_options.yaml'
          - 'android/**/*.gradle'
          - 'android/**/*.gradle.kts'
          - 'android/gradle/wrapper/**'
          - '**/Podfile'
          - '**/Podfile.lock'

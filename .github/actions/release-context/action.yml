name: release-context
description: 解析 pubspec.yaml 中的发布版本并输出 release 上下文

inputs:
  pubspec-path:
    description: pubspec.yaml 文件路径
    required: false
    default: pubspec.yaml

outputs:
  version:
    description: 公开版本号，不含 +build
    value: ${{ steps.parse.outputs.version }}

  public_version:
    description: 公开版本号，不含 +build
    value: ${{ steps.parse.outputs.public_version }}

  pubspec_version:
    description: pubspec.yaml 完整版本号，保留 +build
    value: ${{ steps.parse.outputs.pubspec_version }}

  version_core:
    description: 不含 channel 与 +build 的数字版本主体
    value: ${{ steps.parse.outputs.version_core }}

  channel:
    description: 发布通道，stable / alpha / beta / rc / lts / hotfix
    value: ${{ steps.parse.outputs.channel }}

  build_number:
    description: 构建号
    value: ${{ steps.parse.outputs.build_number }}

  tag:
    description: Git Tag
    value: ${{ steps.parse.outputs.tag }}

  prerelease:
    description: 是否为预发布
    value: ${{ steps.parse.outputs.prerelease }}

  release_title:
    description: GitHub Release 标题
    value: ${{ steps.parse.outputs.release_title }}

runs:
  using: composite
  steps:
    - id: parse
      shell: bash
      env:
        PUBSPEC_PATH: ${{ inputs.pubspec-path }}
      run: |
        set -euo pipefail

        fail() {
          echo "::error::$1" >&2
          exit 1
        }

        if [[ ! -f "$PUBSPEC_PATH" ]]; then
          fail "未找到 pubspec.yaml 文件：$PUBSPEC_PATH"
        fi

        version_line="$(grep -E '^[[:space:]]*version[[:space:]]*:' "$PUBSPEC_PATH" | head -n 1 || true)"

        if [[ -z "$version_line" ]]; then
          fail "未在 $PUBSPEC_PATH 中找到 version 字段。"
        fi

        pubspec_version="${version_line#*:}"
        pubspec_version="${pubspec_version%%#*}"
        pubspec_version="$(echo "$pubspec_version" | xargs)"

        if [[ -z "$pubspec_version" ]]; then
          fail "version 字段为空。"
        fi

        if [[ ! "$pubspec_version" =~ ^([0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?)(-(alpha|beta|hotfix|rc|lts))?\+([1-9][0-9]*)$ ]]; then
          fail "版本号不符合发布规范：$pubspec_version。期望格式：1.0.0+1、1.0.0-alpha+1 或 1.0.0.1-hotfix+1。"
        fi

        version_core="${BASH_REMATCH[1]}"
        channel_suffix="${BASH_REMATCH[3]:-}"
        channel="${BASH_REMATCH[4]:-stable}"
        build_number="${BASH_REMATCH[5]}"
        public_version="${version_core}${channel_suffix}"
        tag="v${public_version}"

        prerelease=true
        if [[ "$channel" == "stable" || "$channel" == "lts" || "$channel" == "hotfix" ]]; then
          prerelease=false
        fi

        release_title="SSPU-AllinOne ${tag}"

        {
          echo "version=$public_version"
          echo "public_version=$public_version"
          echo "pubspec_version=$pubspec_version"
          echo "version_core=$version_core"
          echo "channel=$channel"
          echo "build_number=$build_number"
          echo "tag=$tag"
          echo "prerelease=$prerelease"
          echo "release_title=$release_title"
        } >> "$GITHUB_OUTPUT"

        {
          echo "## Release Context"
          echo
          echo "| Key | Value |"
          echo "| --- | --- |"
          echo "| Public Version | \`$public_version\` |"
          echo "| Pubspec Version | \`$pubspec_version\` |"
          echo "| Version Core | \`$version_core\` |"
          echo "| Tag | \`$tag\` |"
          echo "| Channel | \`$channel\` |"
          echo "| Build Number | \`$build_number\` |"
          echo "| Prerelease | \`$prerelease\` |"
          echo "| Release Title | \`$release_title\` |"
        } >> "$GITHUB_STEP_SUMMARY"

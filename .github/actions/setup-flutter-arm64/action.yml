name: setup-flutter-arm64
description: 在 arm64 Runner 上安装固定版本 Flutter SDK 并执行依赖安装

inputs:
  flutter-version:
    description: Flutter SDK 版本
    required: true
  flutter-git-url:
    description: Flutter SDK Git 仓库地址
    required: true
  desktop-target:
    description: 需要启用并预缓存的桌面目标，支持 windows 或 linux
    required: true
  run-pub-get:
    description: 是否执行 flutter pub get
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: 安装 Flutter arm64 SDK（Windows）
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        FLUTTER_GIT_URL: ${{ inputs.flutter-git-url }}
        FLUTTER_VERSION: ${{ inputs.flutter-version }}
        DESKTOP_TARGET: ${{ inputs.desktop-target }}
      run: |
        $flutterRoot = Join-Path $env:RUNNER_TEMP 'flutter-sdk'
        if (Test-Path $flutterRoot) {
          Remove-Item -LiteralPath $flutterRoot -Recurse -Force
        }

        $flutterTagRef = "refs/tags/{0}:refs/tags/{0}" -f $env:FLUTTER_VERSION
        git clone --filter=blob:none --branch stable $env:FLUTTER_GIT_URL $flutterRoot
        git -C $flutterRoot fetch --depth 1 origin $flutterTagRef
        git -C $flutterRoot checkout "tags/$env:FLUTTER_VERSION"

        "$($flutterRoot)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

        switch ($env:DESKTOP_TARGET) {
          'windows' {
            & "$flutterRoot\bin\flutter.bat" config --enable-windows-desktop
            & "$flutterRoot\bin\flutter.bat" precache --windows
          }
          Default {
            throw "不支持的 Flutter arm64 桌面目标：$env:DESKTOP_TARGET"
          }
        }

    - name: 安装 Flutter arm64 SDK（Unix）
      if: runner.os != 'Windows'
      shell: bash
      env:
        FLUTTER_GIT_URL: ${{ inputs.flutter-git-url }}
        FLUTTER_VERSION: ${{ inputs.flutter-version }}
        DESKTOP_TARGET: ${{ inputs.desktop-target }}
      run: |
        set -euo pipefail

        flutter_root="$RUNNER_TEMP/flutter-sdk"
        rm -rf "$flutter_root"

        git clone --filter=blob:none --branch stable "$FLUTTER_GIT_URL" "$flutter_root"
        git -C "$flutter_root" fetch --depth 1 origin "refs/tags/$FLUTTER_VERSION:refs/tags/$FLUTTER_VERSION"
        git -C "$flutter_root" checkout "tags/$FLUTTER_VERSION"

        echo "$flutter_root/bin" >> "$GITHUB_PATH"

        case "$DESKTOP_TARGET" in
          linux)
            "$flutter_root/bin/flutter" config --enable-linux-desktop
            "$flutter_root/bin/flutter" precache --linux
            ;;
          *)
            echo "不支持的 Flutter arm64 桌面目标：$DESKTOP_TARGET" >&2
            exit 1
            ;;
        esac

    - name: 安装 Flutter 依赖（Windows）
      if: runner.os == 'Windows' && inputs.run-pub-get == 'true'
      shell: pwsh
      run: flutter pub get

    - name: 安装 Flutter 依赖（Unix）
      if: runner.os != 'Windows' && inputs.run-pub-get == 'true'
      shell: bash
      run: flutter pub get

name: generate-release-metadata
description: 为 Release 资产生成 manifest.json 与 SHA256SUMS.txt

inputs:
  asset-dir:
    description: Release 资产目录
    required: true
  version:
    description: 公开版本号，不含 +build
    required: true
  pubspec-version:
    description: pubspec.yaml 完整版本号，保留 +build
    required: true
  channel:
    description: 发布通道
    required: true
  build-number:
    description: 构建号
    required: true
  tag:
    description: Git Tag
    required: true
  release-date:
    description: 发布日期，ISO 8601 UTC
    required: true
  flutter-version:
    description: Flutter 版本
    required: true
  dart-version:
    description: Dart 版本
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        RELEASE_ASSET_DIR: ${{ inputs.asset-dir }}
        RELEASE_VERSION: ${{ inputs.version }}
        RELEASE_PUBSPEC_VERSION: ${{ inputs.pubspec-version }}
        RELEASE_CHANNEL: ${{ inputs.channel }}
        RELEASE_BUILD_NUMBER: ${{ inputs.build-number }}
        RELEASE_TAG: ${{ inputs.tag }}
        RELEASE_DATE: ${{ inputs.release-date }}
        RELEASE_FLUTTER_VERSION: ${{ inputs.flutter-version }}
        RELEASE_DART_VERSION: ${{ inputs.dart-version }}
      run: |
        set -euo pipefail
        python scripts/release/generate_release_metadata.py \
          --asset-dir "$RELEASE_ASSET_DIR" \
          --version "$RELEASE_VERSION" \
          --pubspec-version "$RELEASE_PUBSPEC_VERSION" \
          --channel "$RELEASE_CHANNEL" \
          --build-number "$RELEASE_BUILD_NUMBER" \
          --tag "$RELEASE_TAG" \
          --release-date "$RELEASE_DATE" \
          --flutter-version "$RELEASE_FLUTTER_VERSION" \
          --dart-version "$RELEASE_DART_VERSION"

# Release 工作流
# 公开 Release 只在带 release 标签的 PR merge 后触发，版本、Tag 与资产命名统一来自 pubspec.yaml。
name: Build & Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop
      - release/**
  workflow_dispatch:
    inputs:
      base_ref:
        description: '本次手动发布对应的目标分支（alpha / beta / rc 填 develop；stable / lts / hotfix 填 main）'
        required: true
        default: 'develop'
      release_notes:
        description: '手动触发时使用的 Release Notes，必须包含标准 7 个章节'
        required: true

env:
  FLUTTER_VERSION: '3.41.7'
  FLUTTER_GIT_URL: 'https://github.com/flutter/flutter.git'

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.base_ref || github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'release')
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      public_version: ${{ steps.release.outputs.public_version }}
      pubspec_version: ${{ steps.release.outputs.pubspec_version }}
      version_core: ${{ steps.release.outputs.version_core }}
      channel: ${{ steps.release.outputs.channel }}
      build_number: ${{ steps.release.outputs.build_number }}
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      release_title: ${{ steps.release.outputs.release_title }}
    steps:
      - uses: actions/checkout@v6.0.3

      - id: release
        uses: ./.github/actions/release-context

      - name: 校验触发分支
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            base_ref='${{ github.event.inputs.base_ref }}'
            current_ref='${{ github.ref_name }}'
            if [[ "$current_ref" != "$base_ref" ]]; then
              echo "手动发布的当前 ref 必须与 base_ref 一致：current_ref=$current_ref, base_ref=$base_ref。" >&2
              exit 1
            fi
          else
            base_ref='${{ github.event.pull_request.base.ref }}'
          fi

          channel='${{ steps.release.outputs.channel }}'

          if [[ "$channel" == "stable" || "$channel" == "lts" || "$channel" == "hotfix" ]]; then
            [[ "$base_ref" == "main" ]] || {
              echo "stable / lts / hotfix Release 必须由 develop -> main 的 release PR merge 触发。" >&2
              exit 1
            }
            exit 0
          fi

          [[ "$base_ref" == "develop" ]] || {
            echo "alpha / beta / rc Release 必须由 release/v... -> develop 的 release PR merge 触发，当前目标分支为 $base_ref。" >&2
            exit 1
          }

      - name: 校验 Release Tag 不存在
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git rev-parse --verify --quiet "refs/tags/${{ steps.release.outputs.tag }}" >/dev/null; then
            echo "Release Tag ${{ steps.release.outputs.tag }} 已存在。重发同一公开版本时必须递增 pubspec.yaml 的 +build 并重新走发版流程。" >&2
            exit 1
          fi

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 准备 Android Release 签名
        shell: bash
        run: |
          set -euo pipefail

          missing_secrets=()
          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if [[ "${#missing_secrets[@]}" -gt 0 ]]; then
            printf 'Android Release 签名 Secrets 缺失：%s\n' "${missing_secrets[*]}" >&2
            echo "正式发布不得回退到 debug 签名策略。" >&2
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/ci-release.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=%s\n' 'app/ci-release.jks'
          } > android/key.properties

      - name: 构建 Android Universal APK
        run: flutter build apk --release

      - name: 整理 Android 产物
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-android-universal.apk"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: android-universal
          path: dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-android-universal.apk

  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 构建 Windows x64
        run: flutter build windows --release

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: 生成 Windows 安装器
        shell: pwsh
        run: |
          $installerCompiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $installerCompiler)) {
            throw "未找到 Inno Setup 编译器：$installerCompiler"
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $installerCompiler '.github\installer\windows-x64.iss'

      - uses: ./.github/actions/package-windows-portable
        with:
          bundle-dir: build\windows\x64\runner\Release
          output-path: dist\SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-windows-x64-portable.zip

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-assets
          path: |
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-windows-x64-installer.exe
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-windows-x64-portable.zip

  build-windows-arm64:
    needs: prepare
    runs-on: windows-11-arm
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          architecture: x64

      - uses: ./.github/actions/setup-flutter-arm64
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          flutter-git-url: ${{ env.FLUTTER_GIT_URL }}
          desktop-target: windows

      - name: 构建 Windows arm64
        run: flutter build windows --release

      - name: 定位 Windows arm64 构建目录
        id: windows-arm64-bundle
        shell: pwsh
        run: |
          $windowsExecutables = Get-ChildItem -Path 'build\windows' -Filter 'sspu_allinone.exe' -Recurse
          if ($windowsExecutables.Count -eq 0) {
            Get-ChildItem -Path 'build\windows' -Recurse | Select-Object FullName
            throw '未找到 Windows arm64 构建产物中的主程序。'
          }

          $bundlePath = $windowsExecutables[0].Directory.FullName
          "WINDOWS_ARM64_BUNDLE_DIR=$bundlePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "bundle-dir=$bundlePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Windows arm64 bundle path: $bundlePath"

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: 生成 Windows arm64 安装器
        shell: pwsh
        run: |
          $installerCompiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'

          if (-not (Test-Path $installerCompiler)) {
            throw "未找到 Inno Setup 编译器：$installerCompiler"
          }

          if (-not (Test-Path $env:WINDOWS_ARM64_BUNDLE_DIR)) {
            throw "未找到 Windows arm64 构建目录：$env:WINDOWS_ARM64_BUNDLE_DIR"
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $installerCompiler '.github\installer\windows-arm64.iss'

      - uses: ./.github/actions/package-windows-portable
        with:
          bundle-dir: ${{ steps.windows-arm64-bundle.outputs.bundle-dir }}
          output-path: dist\SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-windows-arm64-portable.zip

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-arm64-assets
          path: |
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-windows-arm64-installer.exe
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-windows-arm64-portable.zip

  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      MACOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.MACOS_SIGNING_CERTIFICATE_BASE64 }}
      MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
      MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 导入 macOS 签名证书
        id: signing
        shell: bash
        run: |
          set -euo pipefail

          missing_secrets=()
          for secret_name in \
            MACOS_SIGNING_CERTIFICATE_BASE64 \
            MACOS_SIGNING_CERTIFICATE_PASSWORD \
            MACOS_NOTARY_APPLE_ID \
            MACOS_NOTARY_TEAM_ID \
            MACOS_NOTARY_PASSWORD; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if [[ "${#missing_secrets[@]}" -gt 0 ]]; then
            printf 'macOS 签名 Secrets 缺失：%s，将产出 unsigned DMG。\n' "${missing_secrets[*]}"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TEMP_KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          TEMP_KEYCHAIN="macos-signing.keychain-db"
          security create-keychain -p "$TEMP_KEYCHAIN_PASSWORD" "$TEMP_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$TEMP_KEYCHAIN"
          security unlock-keychain -p "$TEMP_KEYCHAIN_PASSWORD" "$TEMP_KEYCHAIN"

          printf '%s' "$MACOS_SIGNING_CERTIFICATE_BASE64" | base64 --decode > signing-cert.p12
          security import signing-cert.p12 \
            -k "$TEMP_KEYCHAIN" \
            -P "$MACOS_SIGNING_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/notarytool
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$TEMP_KEYCHAIN_PASSWORD" "$TEMP_KEYCHAIN"

          security list-keychains -d user -s "$TEMP_KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          rm signing-cert.p12
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: 构建 macOS universal
        run: flutter build macos --release

      - name: 签名 macOS App Bundle
        if: steps.signing.outputs.signed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          macos_app_bundle="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          [[ -n "$macos_app_bundle" ]] || {
            echo "未找到 macOS .app 产物。" >&2
            exit 1
          }

          DEVELOPER_ID="$(security find-identity -v -p basic | grep 'Developer ID Application' | head -1 | awk '{print $2}')"
          [[ -n "$DEVELOPER_ID" ]] || {
            echo "未找到 Developer ID Application 证书。" >&2
            exit 1
          }
          echo "使用签名身份: $DEVELOPER_ID"

          codesign --force --deep --sign "$DEVELOPER_ID" \
            --options runtime \
            --entitlements macos/Runner/Release.entitlements \
            --timestamp \
            "$macos_app_bundle"

          codesign --verify --deep --strict --verbose=2 "$macos_app_bundle"

      - name: 剥离 unsigned 构建 entitlement
        if: steps.signing.outputs.signed != 'true'
        shell: bash
        run: |
          set -euo pipefail

          macos_app_bundle="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          [[ -n "$macos_app_bundle" ]] || {
            echo "未找到 macOS .app 产物。" >&2
            exit 1
          }

          codesign --force --deep --sign - \
            --entitlements macos/Runner/Release-unsigned.entitlements \
            "$macos_app_bundle"
          codesign --verify --deep --strict --verbose=2 "$macos_app_bundle"

          app_entitlements="$(codesign -d --entitlements :- "$macos_app_bundle" 2>/dev/null || true)"
          if printf '%s\n' "$app_entitlements" | grep -Eq 'com\.apple\.security\.|keychain-access-groups'; then
            printf '%s\n' "$app_entitlements" >&2
            echo "unsigned macOS 产物不得携带 App Sandbox 或 Keychain Access Groups 等受限 entitlement。" >&2
            exit 1
          fi

      - name: 生成 macOS DMG
        id: dmg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          macos_app_bundle="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"

          npm install -g appdmg

          staging="dmg-staging"
          mkdir -p "$staging"
          cp -R "$macos_app_bundle" "$staging/"
          cp .github/installer/macos/bg.png "$staging/bg.png"

          APP_VERSION="${{ needs.prepare.outputs.public_version }}"
          APP_BUILD="${{ needs.prepare.outputs.build_number }}"

          cat > "$staging/config.json" << APPDMG_EOF
          {
            "title": "SSPU-AllinOne v${APP_VERSION} (${APP_BUILD})",
            "icon-size": 80,
            "window": {
              "size": {
                "width": 520,
                "height": 360
              }
            },
            "background": "bg.png",
            "contents": [
              { "x": 130, "y": 215, "type": "file", "path": "SSPU-AllinOne.app" },
              { "x": 395, "y": 215, "type": "link", "path": "/Applications" }
            ]
          }
          APPDMG_EOF

          if [[ '${{ steps.signing.outputs.signed }}' == 'true' ]]; then
            dmg_suffix="universal"
          else
            dmg_suffix="universal-unsigned"
          fi

          appdmg "$staging/config.json" \
            "dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-macos-${dmg_suffix}.dmg"

          rm -rf "$staging"
          echo "dmg_suffix=${dmg_suffix}" >> "$GITHUB_OUTPUT"

      - name: 公证 DMG
        if: steps.signing.outputs.signed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          dmg_path="dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-macos-universal.dmg"

          notarytool submit "$dmg_path" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --wait \
            --output-format plist > notarization.plist

          notary_status="$(/usr/libexec/PlistBuddy -c "Print :status" notarization.plist)"
          if [[ "$notary_status" != "Accepted" ]]; then
            echo "公证失败: $notary_status" >&2
            cat notarization.plist >&2
            exit 1
          fi

          echo "公证通过，装订票据..."
          stapler staple "$dmg_path"
          echo "装订完成"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-dmg
          path: dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-macos-${{ steps.dmg.outputs.dmg_suffix }}.dmg

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      RELEASE_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: 安装 Linux 打包依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libnotify-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            desktop-file-utils \
            fakeroot \
            file \
            patchelf \
            rpm \
            ruby \
            ruby-dev \
            wget
          sudo gem install --no-document fpm

      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 构建 Linux x64
        run: flutter build linux --release --target-platform linux-x64

      - uses: ./.github/actions/package-linux-release-assets
        with:
          version: ${{ needs.prepare.outputs.version }}
          channel: ${{ needs.prepare.outputs.channel }}
          build-number: ${{ needs.prepare.outputs.build_number }}
          bundle-dir: build/linux/x64/release/bundle
          arch-label: x64
          deb-architecture: amd64
          rpm-architecture: x86_64
          appimagetool-architecture: x86_64

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-assets
          path: |
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-linux-x64-appimage.AppImage
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-linux-x64-deb.deb
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-linux-x64-rpm.rpm
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-linux-x64-portable.tar.gz

  build-linux-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      RELEASE_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: 安装 Linux arm64 打包依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libnotify-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            desktop-file-utils \
            fakeroot \
            file \
            patchelf \
            rpm \
            ruby \
            ruby-dev \
            wget
          sudo gem install --no-document fpm

      - uses: ./.github/actions/setup-flutter-arm64
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          flutter-git-url: ${{ env.FLUTTER_GIT_URL }}
          desktop-target: linux

      - name: 构建 Linux arm64
        run: flutter build linux --release --target-platform linux-arm64

      - uses: ./.github/actions/package-linux-release-assets
        with:
          version: ${{ needs.prepare.outputs.version }}
          channel: ${{ needs.prepare.outputs.channel }}
          build-number: ${{ needs.prepare.outputs.build_number }}
          bundle-dir: build/linux/arm64/release/bundle
          arch-label: arm64
          deb-architecture: arm64
          rpm-architecture: aarch64
          appimagetool-architecture: aarch64

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-arm64-assets
          path: |
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-linux-arm64-appimage.AppImage
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-linux-arm64-deb.deb
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-linux-arm64-rpm.rpm
            dist/SSPU-AllinOne-v${{ needs.prepare.outputs.version }}-linux-arm64-portable.tar.gz

  publish:
    if: needs.prepare.result == 'success'
    needs:
      [
        prepare,
        build-android,
        build-windows,
        build-windows-arm64,
        build-macos,
        build-linux,
        build-linux-arm64,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          run-pub-get: 'false'

      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: 生成 Release Notes
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          MANUAL_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            printf '%s' "$MANUAL_RELEASE_NOTES" > pr-body.md
          else
            printf '%s' "$PR_BODY" > pr-body.md
          fi

          python scripts/release/render_release_notes.py \
            --body-file pr-body.md \
            --output dist/release-notes.md

      - name: 收集工具链版本
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          flutter_version="$(flutter --version --machine | python -c "import json,sys; print(json.load(sys.stdin)['frameworkVersion'])")"
          dart_version="$(dart --version 2>&1 | awk '{print $4}')"
          release_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          {
            echo "flutter_version=$flutter_version"
            echo "dart_version=$dart_version"
            echo "release_date=$release_date"
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/generate-release-metadata
        with:
          asset-dir: dist
          version: ${{ needs.prepare.outputs.version }}
          pubspec-version: ${{ needs.prepare.outputs.pubspec_version }}
          channel: ${{ needs.prepare.outputs.channel }}
          build-number: ${{ needs.prepare.outputs.build_number }}
          tag: ${{ needs.prepare.outputs.tag }}
          release-date: ${{ steps.toolchain.outputs.release_date }}
          flutter-version: ${{ steps.toolchain.outputs.flutter_version }}
          dart-version: ${{ steps.toolchain.outputs.dart_version }}

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_title }}
          body_path: dist/release-notes.md
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          files: dist/*

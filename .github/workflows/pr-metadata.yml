# PR 元数据治理 — 关联 Issue、标签继承、needs-issue 与 Assignees
name: PR Metadata

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  metadata:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const TYPE_LABELS = new Map([
              ['feat', 'enhancement'],
              ['feature', 'enhancement'],
              ['fix', 'bug'],
              ['hotfix', 'bug'],
              ['docs', 'documentation'],
              ['deps', 'dependencies'],
              ['dependabot', 'dependencies'],
              ['ci', 'ci'],
              ['refactor', 'refactor'],
              ['chore', 'chore'],
              ['test', 'test'],
              ['release', 'release-files'],
            ]);
            const INHERITABLE_LABELS = new Set([
              'P0',
              'P1',
              'P2',
              'P3',
              'frontend',
              'services',
              'models',
              'storage',
              'installer',
              'update',
              'auth',
              'notification',
              'ci',
              'governance',
              'release-files',
              'documentation',
              'dependencies',
              'windows',
              'macos',
              'linux',
              'android',
              'ios',
              'web',
            ]);
            const PRIORITY_ORDER = ['P0', 'P1', 'P2', 'P3'];

            const commitItems = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const currentIssue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pr.number,
            });
            const currentLabels = new Set(currentIssue.data.labels.map((label) => label.name));
            const labelsToAdd = new Set();
            const issueNumbers = new Set();

            function addIssue(number) {
              const parsed = Number(number);
              if (!Number.isInteger(parsed) || parsed <= 0) return;
              if (parsed === pr.number) return;
              issueNumbers.add(parsed);
            }

            function addRange(start, end) {
              const parsedStart = Number(start);
              const parsedEnd = Number(end);
              if (!Number.isInteger(parsedStart) || !Number.isInteger(parsedEnd)) return;
              if (parsedStart <= 0 || parsedEnd <= 0 || parsedEnd < parsedStart) return;
              if (parsedEnd - parsedStart > 50) return;
              for (let current = parsedStart; current <= parsedEnd; current += 1) {
                addIssue(current);
              }
            }

            function collectIssueRefs(text) {
              if (!text) return;
              for (const match of text.matchAll(/#(\d+)/g)) addIssue(match[1]);
              for (const match of text.matchAll(/\bissues?[-_/](\d+)-(\d+)\b/gi)) {
                addRange(match[1], match[2]);
              }
              for (const match of text.matchAll(/\bissues?[-_/](\d+)\b/gi)) {
                addIssue(match[1]);
              }
            }

            function detectTypeLabel() {
              const titleMatch = (pr.title || '').match(
                /^(feat|fix|docs|style|refactor|test|chore|ci|build|perf|deps|release)(?:\([^)]+\))?:/i,
              );
              if (titleMatch) {
                return TYPE_LABELS.get(titleMatch[1].toLowerCase());
              }

              const branch = pr.head.ref || '';
              const branchMatch = branch.match(
                /^(?:qintsg\/)?(feature|feat|fix|hotfix|docs|chore|refactor|test|ci|deps|dependabot|release)\//i,
              );
              if (branchMatch) {
                return TYPE_LABELS.get(branchMatch[1].toLowerCase());
              }

              if ((pr.user?.login || '') === 'dependabot[bot]') return 'dependencies';
              return null;
            }

            collectIssueRefs(pr.title || '');
            collectIssueRefs(pr.head.ref || '');
            collectIssueRefs(pr.body || '');
            for (const commitItem of commitItems) {
              collectIssueRefs(commitItem.commit?.message || '');
            }

            const typeLabel = detectTypeLabel();
            if (typeLabel) labelsToAdd.add(typeLabel);

            const linkedIssues = [];
            for (const issueNumber of [...issueNumbers].sort((left, right) => left - right)) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber,
                });
                if (issue.pull_request) continue;
                linkedIssues.push(issue);
              } catch (error) {
                core.warning(`Unable to read issue #${issueNumber}: ${error.message}`);
              }
            }

            const inheritedPriorityLabels = new Set();
            for (const issue of linkedIssues) {
              for (const label of issue.labels || []) {
                const labelName = label.name;
                if (!INHERITABLE_LABELS.has(labelName)) continue;
                if (PRIORITY_ORDER.includes(labelName)) {
                  inheritedPriorityLabels.add(labelName);
                } else {
                  labelsToAdd.add(labelName);
                }
              }
            }

            for (const priorityLabel of PRIORITY_ORDER) {
              if (inheritedPriorityLabels.has(priorityLabel)) {
                labelsToAdd.add(priorityLabel);
                break;
              }
            }

            const exemptFromIssue = (
              (pr.user?.login || '') === 'dependabot[bot]' ||
              (pr.head.ref || '').startsWith('dependabot/') ||
              (pr.head.ref || '').startsWith('release/') ||
              currentLabels.has('documentation') ||
              currentLabels.has('release-files') ||
              currentLabels.has('dependencies') ||
              labelsToAdd.has('documentation') ||
              labelsToAdd.has('release-files') ||
              labelsToAdd.has('dependencies') ||
              labelsToAdd.has('chore')
            );
            if (issueNumbers.size === 0 && !exemptFromIssue) {
              labelsToAdd.add('needs-issue');
            }

            if ((issueNumbers.size > 0 || exemptFromIssue) && currentLabels.has('needs-issue')) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pr.number,
                  name: 'needs-issue',
                });
                currentLabels.delete('needs-issue');
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            const missingLabels = [...labelsToAdd].filter((label) => !currentLabels.has(label));
            if (missingLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: missingLabels,
              });
            }

            function hasReferenceLine(body, issueNumber) {
              const escaped = String(issueNumber);
              return new RegExp(
                `\\b(?:refs?|references?|see|close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s*:?\\s+#${escaped}\\b`,
                'i',
              ).test(body);
            }

            function normalizeIssueSection(currentBody, missingIssues) {
              const referenceLines = missingIssues
                .map((issueNumber) => `Refs #${issueNumber}`)
                .join('\n');
              const issueSectionPattern =
                /(##\s*关联 Issue\s*\n+)([\s\S]*?)(\n##\s+|\n---|\s*$)/;

              if (issueSectionPattern.test(currentBody)) {
                return currentBody.replace(
                  issueSectionPattern,
                  (_match, heading, sectionBody, tail) => {
                    const normalizedSectionBody = (sectionBody || '')
                      .split('\n')
                      .map((line) => line.trim())
                      .filter((line) => line.length > 0)
                      .filter((line) => !/^Closes\s+#\s*$/i.test(line))
                      .filter((line) => !/^关联 Issue：#\s*$/i.test(line))
                      .join('\n');
                    const preservedLines = normalizedSectionBody
                      ? `${normalizedSectionBody}\n${referenceLines}`
                      : referenceLines;
                    return `${heading}${preservedLines}\n\n${tail.trimStart()}`;
                  },
                );
              }

              const trimmedBody = currentBody.trimEnd();
              return `${trimmedBody}\n\n## 关联 Issue\n\n${referenceLines}\n`;
            }

            const currentBody = pr.body || '';
            const missingIssueRefs = [...issueNumbers]
              .sort((left, right) => left - right)
              .filter((issueNumber) => !hasReferenceLine(currentBody, issueNumber));
            if (missingIssueRefs.length > 0) {
              const nextBody = normalizeIssueSection(currentBody, missingIssueRefs);
              if (nextBody !== currentBody) {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pr.number,
                  body: nextBody,
                });
              }
            }

            const existingAssignees = new Set((pr.assignees || []).map((user) => user.login));
            const candidateLogins = new Set();
            const skippedAssignees = [];

            for (const commitItem of commitItems) {
              for (const user of [commitItem.author, commitItem.committer]) {
                if (!user?.login) continue;
                candidateLogins.add(user.login);
              }
            }

            const assigneesToAdd = [];
            for (const login of [...candidateLogins].sort()) {
              if (existingAssignees.has(login)) continue;
              if (login.endsWith('[bot]')) {
                skippedAssignees.push(`${login}: bot`);
                continue;
              }

              try {
                const { data: permission } =
                  await github.rest.repos.getCollaboratorPermissionLevel({
                    owner,
                    repo,
                    username: login,
                  });
                if (!['admin', 'maintain', 'write', 'triage'].includes(permission.permission)) {
                  skippedAssignees.push(`${login}: permission=${permission.permission}`);
                  continue;
                }
              } catch (error) {
                skippedAssignees.push(`${login}: ${error.status || 'error'}`);
                continue;
              }

              assigneesToAdd.push(login);
            }

            if (assigneesToAdd.length > 0) {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: pr.number,
                assignees: assigneesToAdd,
              });
            }

            await core.summary
              .addHeading('PR Metadata')
              .addList([
                `Detected issues: ${issueNumbers.size ? [...issueNumbers].join(', ') : 'none'}`,
                `Added labels: ${missingLabels.length ? missingLabels.join(', ') : 'none'}`,
                `Added assignees: ${assigneesToAdd.length ? assigneesToAdd.join(', ') : 'none'}`,
                `Skipped assignees: ${skippedAssignees.length ? skippedAssignees.join('; ') : 'none'}`,
              ])
              .write();

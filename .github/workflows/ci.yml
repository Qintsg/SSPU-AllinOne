# CI 工作流
# 普通 PR 负责 analyze；带 release 标签的 PR 额外校验发布分支与发布说明模板。
name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited, labeled, unlabeled]

env:
  FLUTTER_VERSION: '3.41.7'

permissions:
  contents: read

jobs:
  quality-gate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos

  release-policy:
    if: >
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - id: release
        uses: ./.github/actions/release-context

      - name: 校验 Release PR 目标分支
        shell: bash
        run: |
          set -euo pipefail

          base_ref='${{ github.event.pull_request.base.ref }}'
          channel='${{ steps.release.outputs.channel }}'

          if [[ "$channel" == "stable" || "$channel" == "lts" || "$channel" == "hotfix" ]]; then
            [[ "$base_ref" == "main" ]] || {
              echo "stable / lts / hotfix Release PR 只能合并到 main，当前目标分支为 $base_ref。" >&2
              exit 1
            }
            exit 0
          fi

          [[ "$base_ref" == "develop" ]] || {
            echo "alpha / beta / rc Release PR 只能合并到 develop，当前目标分支为 $base_ref。" >&2
            exit 1
          }

      - name: 校验 Release PR 正文模板
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          printf '%s' "$PR_BODY" > pr-body.md
          python scripts/release/render_release_notes.py \
            --body-file pr-body.md \
            --output release-notes.md \
            --validate-only

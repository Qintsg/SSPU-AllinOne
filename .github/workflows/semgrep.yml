# Semgrep — 安全规则扫描
name: Semgrep

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]
    types: [opened, reopened, synchronize, ready_for_review]
  schedule:
    - cron: '45 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep@sha256:f4791a54c891eabe1188248135574e6e03dfc31dfd3f3b747c7bec7079bfed1b # latest digest captured 2026-06-13
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output=semgrep-results.sarif --error
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: semgrep-results.sarif

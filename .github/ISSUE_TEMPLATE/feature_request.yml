name: 功能请求
description: 提出新功能、能力增强或体验优化
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        请聚焦"要解决的问题"和"可验收的结果"。涉及账号、接口、截图或日志时请先脱敏。

  - type: textarea
    id: user_need
    attributes:
      label: 需求与场景
      description: 说明目标用户、当前痛点和为什么需要这个能力。
      placeholder: 例如：学生希望在移动端快速查看近期考试安排，目前需要多次跳转。
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: 期望方案
      description: 描述你希望它如何工作；如果还没有方案，可写希望达到的体验或约束。
      placeholder: 例如：在首页增加考试提醒卡片，展示最近 3 场考试并支持跳转详情。
    validations:
      required: true

  - type: dropdown
    id: target_platforms
    attributes:
      label: 目标平台
      multiple: true
      options:
        - 全平台
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
        - Web
        - 暂不确定
    validations:
      required: true

  - type: dropdown
    id: affected_scope
    attributes:
      label: 影响模块
      multiple: true
      options:
        - 前端界面 / 交互
        - 教务 / OA / CAS 登录
        - 体育考勤
        - 校园卡
        - 学校邮箱
        - 信息中心 / 微信公众号
        - 快速跳转
        - 本地存储 / 缓存 / 加密
        - 安装器 / 更新 / Release
        - 通知 / 后台刷新
        - CI / 仓库治理
        - 文档
        - 不确定
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      options:
        - P0 阻塞 / 紧急：核心流程不可用或必须立即处理
        - P1 高优先级：近期版本应优先处理
        - P2 中优先级：排入计划
        - P3 低优先级：后续优化或有空处理
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: 兼容性影响
      options:
        - label: 本功能可能引入 Breaking Change（需要迁移或影响现有用户数据）

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 用可检查条目描述完成条件。
      value: |
        - 
        - 
        - 
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 备选方案、非目标、脱敏截图、参考链接或相关 Issue。
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，确认不是重复需求
          required: true
        - label: 我没有提交账号、密码、Cookie、Token 或其它敏感信息
          required: true

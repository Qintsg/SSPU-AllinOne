name: 文档问题
description: 报告文档错误、缺失、过时或表达不清
title: "[Docs] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        请指出具体文件或页面。若文档涉及账号、截图或日志，请先脱敏。

  - type: input
    id: page
    attributes:
      label: 相关页面或文件
      placeholder: README.md / docs/xxx.md / .github/xxx.yml
    validations:
      required: true

  - type: dropdown
    id: doc_type
    attributes:
      label: 文档问题类型
      multiple: true
      options:
        - 内容错误
        - 内容过时
        - 缺少说明
        - 表达不清
        - 链接失效
        - 示例无法运行
        - 发布 / 工作流规则不一致
    validations:
      required: true

  - type: dropdown
    id: affected_scope
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 用户使用
        - 开发者贡献
        - CI / 仓库治理
        - Release / 安装器
        - 平台构建
        - 法律协议 / 隐私说明
        - 不确定
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: 问题概述
      description: 简述哪里不准确、缺失或容易误解。
      placeholder: 例如：docs/RELEASE.md 中的 release label 说明与实际 workflow 条件不一致。
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 修改建议
      placeholder: 你建议如何修改？如有参考链接请一并提供。
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已确认问题指向具体文件或页面
          required: true
        - label: 我没有提交账号、Cookie、Token 或其它敏感信息
          required: true

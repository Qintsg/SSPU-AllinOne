name: Release 申请
description: 为预发布、稳定版、lts 或 hotfix 发布准备版本、平台清单与发布说明
title: "[Release] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        公开 Release 由带 `release` label 的 PR merge 自动触发。
        alpha / beta / rc 使用 `release/v... -> develop` 并携带 `release` label。
        stable / lts / hotfix 先走 `release/v... -> develop` 且不携带 `release` label，再走 `develop -> main` 并携带 `release` label。
        版本号只维护 `pubspec.yaml` 与 `docs/CHANGELOG.md`；安装包文件名和 Release 描述不得显式写出 `+build`。
  - type: input
    id: public_version
    attributes:
      label: 公开版本
      description: 不含 `+build`，格式为 `X.X.X[-channel]` 或 `X.X.X.X[-channel]`。
      placeholder: 例如：1.0.0-alpha
    validations:
      required: true
  - type: input
    id: pubspec_version
    attributes:
      label: pubspec.yaml 完整版本
      description: 必须包含 `+build`，例如 `1.0.0-alpha+1`。
      placeholder: 例如：1.0.0-alpha+1
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: 发布通道
      options:
        - stable
        - alpha
        - beta
        - rc
        - lts
        - hotfix
    validations:
      required: true
  - type: dropdown
    id: release_flow
    attributes:
      label: 发布 PR 流程
      options:
        - alpha/beta/rc：release/v... -> develop，携带 release label
        - stable/lts/hotfix 第一段：release/v... -> develop，不携带 release label
        - stable/lts/hotfix 第二段：develop -> main，携带 release label
    validations:
      required: true
  - type: dropdown
    id: platforms
    attributes:
      label: 本次计划发布平台
      multiple: true
      options:
        - Android universal APK
        - Windows x64 installer
        - Windows x64 portable
        - Windows arm64 installer
        - Windows arm64 portable
        - macOS universal unsigned DMG
        - Linux x64 AppImage
        - Linux x64 deb
        - Linux x64 rpm
        - Linux x64 portable tar.gz
        - Linux arm64 AppImage
        - Linux arm64 deb
        - Linux arm64 rpm
        - Linux arm64 portable tar.gz
        - Web static.zip
    validations:
      required: true
  - type: textarea
    id: highlights
    attributes:
      label: 发布亮点
      description: 简述本次发布的主要新增、修复和优化，不要显式写出 `+build`。
      placeholder: |
        - 新增 ...
        - 修复 ...
        - 优化 ...
    validations:
      required: true
  - type: textarea
    id: missing_platforms
    attributes:
      label: 缺失或异常平台说明
      description: 若某些平台本次不发布或存在限制，请写明原因。
      placeholder: 例如：macOS 当前未完成签名，仅提供 unsigned DMG。
  - type: textarea
    id: known_issues
    attributes:
      label: 已知问题
      description: 发布后仍存在但可接受的问题。
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: 发布前检查
      options:
        - label: 我已确认 `flutter analyze` 通过
          required: true
        - label: 我已确认 `flutter test` 通过
          required: true
        - label: 我已确认版本号只修改 `pubspec.yaml` 与 `docs/CHANGELOG.md`
          required: true
        - label: 我已确认 Tag、Release 标题和资产命名使用公开版本且不包含 `+build`
          required: true
        - label: 我已确认 PR 正文将按发布说明模板填写
          required: true
        - label: 我已确认 `docs/CHANGELOG.md` 和 `docs/RELEASE.md` 已同步
          required: true

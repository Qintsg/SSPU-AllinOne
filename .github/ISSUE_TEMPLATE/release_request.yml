name: Release 申请
description: 为预发布、稳定版、lts 或 hotfix 发布准备版本、平台清单与发布说明
title: "[Release] "
labels: ["task", "release-files"]
body:
  - type: markdown
    attributes:
      value: |
        公开 Release 由带 `release` label 的 PR merge 自动触发，本 Issue 不会自动添加该标签。
        版本号只维护 `pubspec.yaml` 与 `docs/CHANGELOG.md`；安装包文件名和 Release 标题不得写出 `+build`。

  - type: input
    id: public_version
    attributes:
      label: 公开版本
      description: 不含 `+build`，格式为 `X.X.X[-channel]`。
      placeholder: 例如：1.0.0-alpha
    validations:
      required: true

  - type: input
    id: pubspec_version
    attributes:
      label: pubspec.yaml 完整版本
      description: 必须包含 `+build`。
      placeholder: 例如：1.0.0-alpha+1
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: 发布通道
      options:
        - stable
        - alpha
        - beta
        - rc
        - lts
        - hotfix
    validations:
      required: true

  - type: dropdown
    id: release_type
    attributes:
      label: 发布类型
      options:
        - Pre-release（alpha / beta / rc）
        - 普通 Release（stable / lts / hotfix）
        - 重新发布（同一公开版本，仅递增 +build）
    validations:
      required: true

  - type: dropdown
    id: release_flow
    attributes:
      label: 发布 PR 流程
      options:
        - alpha/beta/rc：release/v... -> develop，Release PR 携带 release label
        - stable/lts/hotfix 第一段：release/v... -> develop，不携带 release label
        - stable/lts/hotfix 第二段：develop -> main，携带 release label
    validations:
      required: true

  - type: dropdown
    id: platforms
    attributes:
      label: 本次计划发布平台
      multiple: true
      options:
        - Android universal APK
        - Windows x64 installer
        - Windows x64 portable
        - Windows arm64 installer
        - Windows arm64 portable
        - macOS universal signed DMG
        - Linux x64 AppImage
        - Linux x64 deb
        - Linux x64 rpm
        - Linux x64 portable tar.gz
        - Linux arm64 AppImage
        - Linux arm64 deb
        - Linux arm64 rpm
        - Linux arm64 portable tar.gz
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      options:
        - P0 阻塞 / 紧急：当前发布被阻塞
        - P1 高优先级：近期版本发版准备
        - P2 中优先级：排入后续发版计划
        - P3 低优先级：长期发布治理优化
    validations:
      required: true

  - type: textarea
    id: highlights
    attributes:
      label: 发布亮点
      description: 简述本次发布的主要新增、修复和优化，不要写出 `+build`。
      value: |
        - 新增：
        - 修复：
        - 优化：
    validations:
      required: true

  - type: textarea
    id: known_issues
    attributes:
      label: 已知问题与缺失平台
      description: 发布后仍存在的问题；若某些平台本次不发布请写明原因；若无请写"无"。
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 发布前检查
      options:
        - label: 我已确认本 Issue 不会自动添加 `release` label，需在 PR 人工添加
          required: true
        - label: 我已确认 `flutter analyze` 和 `flutter test` 通过
          required: true
        - label: 我已确认版本号只修改 `pubspec.yaml` 与 `docs/CHANGELOG.md`
          required: true
        - label: 我已确认 Tag 和 Release 标题不包含 `+build`
          required: true
        - label: 我已确认 `docs/CHANGELOG.md` 和 `docs/RELEASE.md` 已同步
          required: true

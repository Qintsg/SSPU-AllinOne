name: Bug 反馈
description: 报告程序错误、异常行为、崩溃或平台适配问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈 Bug。请勿提交账号、密码、Cookie、Token、验证码、身份证件、私钥或其它敏感信息。
        若日志包含敏感内容，请先脱敏。

  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 用 1-3 句话说明异常现象、触发入口和影响结果。
      placeholder: 例如：Windows 版首次打开设置页时卡住，必须重启应用才能恢复。
    validations:
      required: true

  - type: dropdown
    id: affected_platforms
    attributes:
      label: 受影响平台
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
        - Web
        - 不确定 / 多平台待确认
    validations:
      required: true

  - type: dropdown
    id: affected_scope
    attributes:
      label: 影响模块
      multiple: true
      options:
        - 前端界面 / 交互
        - 教务 / OA / CAS 登录
        - 体育考勤
        - 校园卡
        - 学校邮箱
        - 信息中心 / 微信公众号
        - 快速跳转
        - 本地存储 / 缓存 / 加密
        - 安装器 / 更新 / Release
        - 通知 / 后台刷新
        - CI / 仓库治理
        - 文档
        - 不确定
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      options:
        - P0 阻塞 / 紧急：核心功能不可用或有数据风险
        - P1 高优先级：主要流程受影响
        - P2 中优先级：排入计划
        - P3 低优先级：轻微问题或后续优化
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: 是否为回归
      description: 该功能在之前的版本是否正常工作？
      options:
        - 是，之前版本正常（请在补充信息中填写正常版本号）
        - 否，首次发现
        - 不确定
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本 / Commit / Branch
      placeholder: v0.2.7-alpha / commit hash / branch name
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如果暂时无法稳定复现，请写明已观察到的触发条件和频率。
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: 期望行为与实际行为
      value: |
        期望：

        实际：
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志、截图或录屏
      description: 可粘贴脱敏日志、控制台输出、截图或录屏链接。
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，确认不是重复问题
          required: true
        - label: 我已移除日志和截图中的敏感信息
          required: true

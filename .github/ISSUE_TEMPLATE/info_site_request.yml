name: 信息网页接入请求
description: 提交新增学院/部门官网消息源、补充栏目页或修复现有站点解析的请求
title: "[Feature] 接入信息网页："
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        请尽量一次性补齐站点名称、官网地址、栏目列表页 URL 和页面结构特征。
        如果是对已有来源的优化，请明确写出当前来源名称或渠道 ID。
        请勿提交后台 Cookie、账号密码、验证码或未公开页面内容。

  - type: dropdown
    id: request_type
    attributes:
      label: 请求类型
      options:
        - 新增官网消息来源
        - 优化已有官网消息来源
        - 修复已有官网解析问题
    validations:
      required: true

  - type: input
    id: unit_name
    attributes:
      label: 单位名称
      description: 学院、职能部门、中心或站点名称。
      placeholder: 例如：资源与环境工程学院 / 图书馆（档案馆）
    validations:
      required: true

  - type: dropdown
    id: unit_type
    attributes:
      label: 单位类型
      options:
        - 教学单位
        - 职能部门
        - 中心 / 场馆
        - 其它
    validations:
      required: true

  - type: input
    id: homepage_url
    attributes:
      label: 官网首页 URL
      description: 公开可访问的站点首页地址，使用完整 https 链接。
      placeholder: https://example.sspu.edu.cn/
    validations:
      required: true

  - type: input
    id: existing_channel
    attributes:
      label: 现有来源名称 / 渠道 ID（可选）
      description: 优化或修复已有来源时填写应用内来源名称或 `channel_config.dart` 中的渠道 ID。
      placeholder: 例如：college_re / 图书馆

  - type: textarea
    id: category_pages
    attributes:
      label: 栏目与列表页 URL
      description: 一行一个栏目，格式：显示名 | URL
      value: |
        新闻资讯 | 
        通知公告 | 
    validations:
      required: true

  - type: textarea
    id: page_structure
    attributes:
      label: 页面结构特征
      description: 列表页的关键结构、选择器或 HTML 特征；没有把握可写"不确定"。
      value: |
        列表容器：
        标题：
        日期：
        链接：
    validations:
      required: false

  - type: dropdown
    id: detail_time
    attributes:
      label: 详情页精确发布时间
      description: 如果列表页只有日期没有时间，且详情页提供更精确的发布时间。
      options:
        - 不需要，列表页日期足够
        - 需要，详情页有更精确时间
        - 不确定，需先调研
    validations:
      required: true

  - type: dropdown
    id: target_platforms
    attributes:
      label: 目标平台
      multiple: true
      options:
        - 全平台
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
        - Web
        - 暂不确定
    validations:
      required: true

  - type: dropdown
    id: affected_scope
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 信息中心
        - 快速跳转
        - 设置
        - 通知 / 后台刷新
        - 本地存储 / 缓存
        - 文档
        - 不确定
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      options:
        - P0 阻塞 / 紧急：现有核心来源不可用
        - P1 高优先级：主要信息来源受影响
        - P2 中优先级：排入计划
        - P3 低优先级：后续补充或优化
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 用可检查的条目说明什么情况算完成。
      value: |
        - 应用内显示正确的来源名称与分类名称
        - 可按给定栏目列表页抓取消息
        - 刷新后不出现无效链接或解析异常
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: 补充信息
      description: 快速跳转需求、认证限制、反爬限制、外链跳转等。
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已确认该站点需求不是重复 Issue
          required: true
        - label: 我已提供官网地址、栏目列表页 URL 和验收标准
          required: true
        - label: 我没有提交后台 Cookie、账号密码、验证码或其它敏感信息
          required: true
